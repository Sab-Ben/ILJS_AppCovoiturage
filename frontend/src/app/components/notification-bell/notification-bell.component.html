<div class="notification-bell" (click)="refresh()" style="cursor:pointer; position: relative;">
  <span>🔔</span>
  <span
    *ngIf="(unreadCount$ | async) as c"
    [style.display]="c > 0 ? 'inline-block' : 'none'"
    style="
      position:absolute; top:-6px; right:-10px;
      background:red; color:white; border-radius:999px;
      padding:2px 6px; font-size:12px;
    "
  >
    {{ c }}
  </span>
</div>
