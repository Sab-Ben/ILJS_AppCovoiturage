<section class="cta">
  <div class="cta__container">
    <div class="cta__box">
      <div class="cta__box-content">
        <div class="cta__badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span>Inscription gratuite</span>
        </div>

        <h2 class="cta__title">
          Prêt à gagner<br>
          <span class="cta__title-accent">vos premiers points ?</span>
        </h2>

        <p class="cta__description">
          Inscrivez-vous en 30 secondes et recevez vos points de bienvenue. Conduisez ou voyagez, c'est vous qui choisissez.
        </p>

        <div class="cta__buttons">
          <button class="cta__button cta__button--outline" (click)="onAction()">
            Proposer un trajet
          </button>
          <button class="cta__button cta__button--primary" (click)="onAction()">
            Trouver un trajet
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
