<section class="hero">
  <div class="hero__bg">
    <img src="https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=1920&h=1080&fit=crop&q=80" alt="" class="hero__bg-img"/>
    <div class="hero__bg-overlay"></div>
  </div>
  <div class="hero__glow hero__glow--top-left"></div>
  <div class="hero__glow hero__glow--top-right"></div>
  <div class="hero__glow hero__glow--bottom"></div>

  <div class="hero__container">
    <div class="hero__content">
      <div class="hero__badge">
        <span class="hero__badge-dot"></span>
        <span class="hero__badge-text">Covoiturage gratuit basé sur les points</span>
      </div>

      <h1 class="hero__title">
        Partagez la route,<br>
        <span class="hero__title-accent">gagnez des points.</span>
      </h1>

      <p class="hero__subtitle">
        Pas d'argent, juste des points. Conduisez pour en gagner, voyagez pour en dépenser.<br>
        Un covoiturage solidaire et écologique.
      </p>

      <form class="hero__search" (ngSubmit)="onSearch()">
        <div class="hero__search-input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/>
          </svg>
          <input type="text" placeholder="Départ" [(ngModel)]="departure" name="departure" class="hero__input"/>
        </div>

        <div class="hero__search-input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/>
          </svg>
          <input type="text" placeholder="Arrivée" [(ngModel)]="arrival" name="arrival" class="hero__input"/>
        </div>

        <div class="hero__search-input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 10h18" stroke="currentColor" stroke-width="2"/>
            <path d="M9 2v4M15 2v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="date" [(ngModel)]="selectedDate" name="date" class="hero__input"/>
        </div>

        <button type="submit" class="hero__search-btn">
          Rechercher
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>

      <div class="hero__stats">
        <div class="hero__stat">
          <div class="hero__stat-value">0&euro;</div>
          <div class="hero__stat-label">Aucun paiement</div>
        </div>
        <div class="hero__stat-divider"></div>
        <div class="hero__stat">
          <div class="hero__stat-value hero__stat-value--primary">Points</div>
          <div class="hero__stat-label">Système solidaire</div>
        </div>
      </div>
    </div>
  </div>
</section>
