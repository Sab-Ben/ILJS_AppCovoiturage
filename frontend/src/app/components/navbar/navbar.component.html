<header class="nav" [class.nav--scrolled]="isScrolled">
  <a routerLink="/dashboard" class="nav__logo">
    <div class="nav__logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-2-2.1-3.2C13.1 5.6 11.7 5 10.3 5H5c-1.7 0-3 1.3-3 3v6c0 .6.4 1 1 1h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="7" cy="17" r="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="17" cy="17" r="2" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>
    <span class="nav__logo-text">CoVoiture</span>
  </a>

  <div class="nav__center">
    <nav class="nav__links">
      <a routerLink="/dashboard" routerLinkActive="nav__link--active" [routerLinkActiveOptions]="{exact: true}" class="nav__link">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9,22 9,12 15,12 15,22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <a routerLink="/search-rides" routerLinkActive="nav__link--active" class="nav__link">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Rechercher
      </a>
      <a *ngIf="user?.role === 'CONDUCTEUR'" routerLink="/create-ride" routerLinkActive="nav__link--active" class="nav__link">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Proposer
      </a>
      <a *ngIf="user?.role === 'CONDUCTEUR'" routerLink="/my-rides" routerLinkActive="nav__link--active" class="nav__link">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Mes trajets
      </a>
    </nav>
  </div>

  <div class="nav__actions">
    <button class="nav__theme-toggle" (click)="toggleTheme()" [attr.title]="isDarkMode ? 'Mode clair' : 'Mode sombre'">
      <svg *ngIf="isDarkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg *ngIf="!isDarkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <a routerLink="/dashboard" class="nav__avatar">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 11a3 3 0 100-6 3 3 0 000 6zm0 2c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z" fill="currentColor"/>
      </svg>
    </a>

    <button class="nav__logout" (click)="logout()" title="Déconnexion">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</header>
