<div class="container mt-4">
    <div class="mb-3">
        <a routerLink="/profile" class="btn-back">⬅ Retour au profil</a>
    </div>

    <h2>Mes trajets publiés</h2>

    <div class="row">
        <div class="col-md-6">
            <div *ngIf="isLoading">Chargement...</div>

            <div class="rides-list" *ngIf="trajets.length > 0">
                <div *ngFor="let trajet of trajets"
                     class="card mb-3"
                     [class.border-primary]="selectedTrajet === trajet"
                     style="cursor: pointer;"
                     (click)="selectTrajet(trajet)">

                    <div class="card-body">
                        <h5 class="card-title">{{ trajet.villeDepart }} ➝ {{ trajet.villeArrivee }}</h5>
                        <p class="card-text mb-2">
                            <strong>Date :</strong> {{ trajet.dateHeureDepart | date:'dd/MM/yyyy HH:mm' }}
                        </p>

                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-sm btn-outline-primary">👁 Voir sur la carte</button>

                            <span [title]="isDeletable(trajet.dateHeureDepart) ? '' : 'Trop tard pour supprimer'">
                    <button class="btn btn-danger btn-sm"
                            [disabled]="!isDeletable(trajet.dateHeureDepart)"
                            (click)="$event.stopPropagation(); deleteTrajet(trajet.id!)">
                        🗑 Supprimer
                    </button>
                </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="sticky-top" style="top: 20px;">
                <div class="card">
                    <div class="card-header bg-light">
            <span *ngIf="selectedTrajet">
                Trajet : {{ selectedTrajet.villeDepart }} - {{ selectedTrajet.villeArrivee }}
            </span>
                        <span *ngIf="!selectedTrajet">Sélectionnez un trajet pour voir la carte</span>
                    </div>
                    <div class="card-body p-0">
                        <app-map
                                [villeDepart]="selectedTrajet?.villeDepart || ''"
                                [villeArrivee]="selectedTrajet?.villeArrivee || ''">
                        </app-map>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
