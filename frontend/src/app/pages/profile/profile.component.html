<div *ngIf="user" class="profile-container">
    <h1 i18n="@@mySpaceHeader">Mon Espace</h1>

    <div class="card points-card">
        <h2 i18n="@@pointsBalanceHeader">💰 Solde de points</h2>
        <p class="points-value">{{ user.pointBalance }} <span i18n="@@pointsUnit">pts</span></p>
    </div>

    <div class="card info-card">
        <h2 i18n="@@myInfoHeader">👤 Mes Informations</h2>

        <div *ngIf="!isEditing">
            <p><strong i18n="@@firstNameLabel">Prénom :</strong> {{ user.firstname }}</p>
            <p><strong i18n="@@lastNameLabel">Nom :</strong> {{ user.lastname }}</p>
            <p><strong i18n="@@emailLabel">Email :</strong> {{ user.email }}</p>
            <p><strong i18n="@@roleLabel">Statut :</strong> {{ user.role }}</p>
            <button (click)="isEditing = true" i18n="@@editProfileBtn">Modifier mon profil</button>
        </div>

        <div *ngIf="isEditing">
            <label>
                <span i18n="@@firstNameLabel">Prénom :</span>
                <input [(ngModel)]="user.firstname">
            </label>
            <label>
                <span i18n="@@lastNameLabel">Nom :</span>
                <input [(ngModel)]="user.lastname">
            </label>
            <label>
                <span i18n="@@roleLabel">Statut :</span>
            </label>
            <select [(ngModel)]="user.role" name="role">
                <option *ngFor="let r of roles" [value]="r">
                    {{ r }} </option>
            </select>
            <button (click)="saveProfile()" i18n="@@saveBtn">Enregistrer</button>
            <button (click)="isEditing = false" i18n="@@cancelBtn">Annuler</button>
        </div>

        <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    </div>

    <div class="actions-container" style="margin: 20px 0; text-align: center;">
        <button routerLink="/create-ride" class="btn-primary-action">
            Créer un trajet
        </button>
    </div>

    <button class="logout-btn" (click)="logout()" i18n="@@logoutBtn">Se déconnecter</button>
</div>
