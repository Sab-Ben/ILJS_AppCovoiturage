<div class="page container">
    <h2>Mes réservations</h2>

    <div *ngIf="errorMsg" class="alert alert-danger">
        {{ errorMsg }}
    </div>

    <div *ngIf="loading">Chargement...</div>

    <div class="tabs mb-3">
        <button class="btn" [class.active]="tab==='reserved'" (click)="switchTab('reserved')">
            Réservées ({{ reserved.length }})
        </button>
        <button class="btn" [class.active]="tab==='completed'" (click)="switchTab('completed')">
            Effectuées ({{ completed.length }})
        </button>
    </div>

    <div *ngIf="!loading">

        <div *ngIf="tab === 'reserved'">
            <div *ngIf="reserved.length === 0" class="empty">Aucune réservation en cours.</div>

            <div class="card mb-3" *ngFor="let r of reserved; trackBy: trackById">
                <div><strong>Réservation #{{ r.id }}</strong></div>
                <div>Trajet: {{ r.ride?.from }} → {{ r.ride?.to }}</div>
                <div>Places: {{ r.seats }}</div>
                <button class="btn btn-outline-danger" (click)="cancel(r)">Annuler</button>
            </div>
        </div>

        <div *ngIf="tab === 'completed'">
            <div *ngIf="completed.length === 0" class="empty">Aucune course effectuée.</div>

            <div class="card mb-3" *ngFor="let r of completed; trackBy: trackById">
                <div><strong>Réservation #{{ r.id }}</strong></div>
                <div>Trajet: {{ r.ride?.from }} → {{ r.ride?.to }}</div>
                <div>Statut: Terminée</div>
            </div>
        </div>

    </div>
</div>
