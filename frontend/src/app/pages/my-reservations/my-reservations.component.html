<div class="container">
  <h2>Mes réservations</h2>

  <div *ngIf="loading" class="info mb-3">Chargement…</div>
  <div *ngIf="errorMsg && !loading" class="warning p-3 mb-3">{{ errorMsg }}</div>

  <div *ngIf="!loading && reservations.length === 0" class="bg-light p-3 mb-3">
    Aucune réservation en cours.
  </div>

  <div *ngIf="!loading">
    <div class="ride-card mb-3" *ngFor="let r of reservations; trackBy: trackById">
      <div class="ride-main">
        <div class="title">{{ r.ride.from }} → {{ r.ride.to }}</div>
        <div class="meta">
          <span>{{ r.ride.date }}</span>
          <span *ngIf="r.ride.departureTime">• {{ r.ride.departureTime }}</span>
        </div>
        <div class="sub">
          <strong>Places:</strong> {{ r.seats }}
          &nbsp;&nbsp; <strong>Conducteur:</strong> {{ r.ride.driverName || '—' }}
        </div>
      </div>

      <div class="ride-actions">
        <a class="btn btn-secondary me-2" [routerLink]="['/ride-detail', r.ride.id]">Voir détail</a>
        <button class="btn btn-outline-danger" type="button" (click)="openCancelModal(r)">
          Annuler
        </button>
      </div>
    </div>
  </div>

  <app-confirm-modal
    [visible]="showCancelModal"
    title="Annuler la réservation"
    [message]="reservationToCancel ? 'Voulez-vous annuler votre réservation ' + reservationToCancel.ride.from + ' → ' + reservationToCancel.ride.to + ' du ' + reservationToCancel.ride.date + ' ?' : ''"
    confirmLabel="Oui, annuler"
    cancelLabel="Non, garder"
    variant="danger"
    icon="trash"
    (confirmed)="confirmCancel()"
    (cancelled)="closeCancelModal()">
  </app-confirm-modal>
</div>
